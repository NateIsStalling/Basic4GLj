name: Publish GitHub Packages

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional package version override (e.g. 1.2.3 or v1.2.3)
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          RAW_VERSION="${{ github.event.release.tag_name || github.event.inputs.release_version || github.ref_name }}"
          RAW_VERSION="${RAW_VERSION#refs/tags/}"
          NORMALIZED_VERSION="${RAW_VERSION}"
          if [[ "$NORMALIZED_VERSION" =~ ^[vV][0-9] ]]; then
            NORMALIZED_VERSION="${NORMALIZED_VERSION:1}"
          fi
          NORMALIZED_VERSION="$(echo "$NORMALIZED_VERSION" | sed -E 's/[^0-9A-Za-z._-]+/-/g')"
          echo "release_version=$NORMALIZED_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish language modules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          ./gradlew \
            :language-core:publish \
            :language-spi:publish \
            :runtime:publish \
            -PreleaseVersion="${RELEASE_VERSION}" \
            --no-daemon

